steps:
  # 1. Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/meualbum/api:${SHORT_SHA}'
      - .

  # 2. Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/meualbum/api:${SHORT_SHA}'

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - meualbum-api
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/meualbum/api:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --set-secrets=MONGODB_URI=MONGODB_URI:latest,JWT_SECRET=JWT_SECRET:latest,RESEND_API_KEY=RESEND_API_KEY:latest,CLIENT_URL=CLIENT_URL:latest

  # 4. Install deps for frontend build
  - name: 'node:22-alpine'
    entrypoint: npm
    args: [ci]

  # 5. Build frontend (API calls roteadas via Firebase Hosting rewrite — sem VITE_API_URL)
  - name: 'node:22-alpine'
    entrypoint: npm
    args: [run, build, -w, client]
    env:
      - NODE_ENV=production

  # 6. Deploy frontend to Firebase Hosting
  #    Usa o Hosting target `app` (declarado em firebase.json e mapeado por projeto no
  #    .firebaserc → site = projectId). Evita a auto-resolução do site default do
  #    firebase-tools, que falha com "site with no site name or target name" mesmo
  #    havendo um DEFAULT_SITE. Versão fixada para builds reprodutíveis.
  - name: 'node:22-alpine'
    entrypoint: sh
    args:
      - -c
      - |
        npm install -g firebase-tools@15.18.0
        firebase deploy --only hosting:app --project ${_FIREBASE_PROJECT_ID}

substitutions:
  _REGION: southamerica-east1
  # Definir por trigger:
  _FIREBASE_PROJECT_ID: ''  # meualbum-tst ou meualbum-prd
  # _API_URL não é mais necessário — Firebase Hosting proxy /api/** → Cloud Run

options:
  logging: CLOUD_LOGGING_ONLY
