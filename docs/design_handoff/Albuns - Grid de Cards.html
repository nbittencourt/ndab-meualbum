<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meu Album — AL1 · Variantes de Grid de Figurinhas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" />
  <link rel="stylesheet" href="styles.css" />
  <style>html, body { margin: 0; padding: 0; background: #f0eee9; } #root { min-height: 100vh; }</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="shared-chrome.jsx"></script>
  <script type="text/babel" src="albuns-sticker-grid.jsx"></script>

  <script type="text/babel">
    function App() {
      return (
        <DesignCanvas>

          <DCSection
            id="var-a"
            title="Variante A — Grade de Selos"
            subtitle="Grid compacto · 5 colunas mob / 8 colunas desk · codificação por cor · barra de filtros"
          >
            <DCArtboard id="va-mob" label="Mobile · 390 px" width={390} height={1380}>
              <AL1MobileA />
            </DCArtboard>
            <DCArtboard id="va-desk" label="Desktop · 1280 px" width={1280} height={1220}>
              <AL1DesktopA />
            </DCArtboard>
          </DCSection>

          <DCSection
            id="var-b"
            title="Variante B — Fichas de Jogador"
            subtitle="Cards detalhados · 3 colunas mob / 5 colunas desk · nome em destaque · botão 'Colar →' inline"
          >
            <DCArtboard id="vb-mob" label="Mobile · 390 px" width={390} height={1780}>
              <AL1MobileB />
            </DCArtboard>
            <DCArtboard id="vb-desk" label="Desktop · 1280 px" width={1280} height={1360}>
              <AL1DesktopB />
            </DCArtboard>
          </DCSection>

        </DesignCanvas>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
