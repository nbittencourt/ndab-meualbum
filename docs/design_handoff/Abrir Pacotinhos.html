<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meu Album — Abrir Pacotinhos</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" />

  <link rel="stylesheet" href="styles.css" />
  <style>
    html, body { margin: 0; padding: 0; background: #f0eee9; }
    #root { min-height: 100vh; }
    @keyframes apBlink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="abrir-pacotinhos.jsx"></script>
  <script type="text/babel">
    function App() {
      return (
        <DesignCanvas>
          <DCSection
            id="ap1-main"
            title="AP1 · Tela principal — Entrada + Pilha"
            subtitle="Mobile-first 390px · estados-chave da tela unificada"
          >
            <DCArtboard id="ap1-active" label="01 · Em uso — pilha com vários estados (PENDENTE, COLADA, REPETIDA, sem álbum elegível)" width={390} height={1340}>
              <AP1Screen state="active" />
            </DCArtboard>
            <DCArtboard id="ap1-empty" label="02 · Início — pilha vazia, modo Digitar" width={390} height={620}>
              <AP1Screen state="empty" />
            </DCArtboard>
            <DCArtboard id="ap1-error" label="03 · Erro de validação inline — número fora do catálogo" width={390} height={620}>
              <AP1Screen state="error" />
            </DCArtboard>
            <DCArtboard id="ap1-camera-mode" label="04 · Modo Fotografar selecionado (antes de abrir o modal)" width={390} height={620}>
              <AP1Screen state="camera-mode" />
            </DCArtboard>
            <DCArtboard id="ap1-limit" label="05 · Limite de 100 pendentes atingido (RN-AP28) — nova entrada bloqueada" width={390} height={700}>
              <AP1Screen state="limit-reached" />
            </DCArtboard>
            <DCArtboard id="ap1-discard" label="06 · Confirmação de descarte inline no card (RN-AP24) — exibe número + nome" width={390} height={1400}>
              <AP1Screen state="discard-confirm" />
            </DCArtboard>
          </DCSection>

          <DCSection
            id="ap0"
            title="AP0 · Seleção de tipo de álbum"
            subtitle="Passo obrigatório em nova sessão · uma opção hoje, preparado para múltiplos tipos"
          >
            <DCArtboard id="ap0" label="AP0 · Seleção de tipo de álbum" width={390} height={760}>
              <AP0Screen />
            </DCArtboard>
          </DCSection>

          <DCSection
            id="modais"
            title="Modais sobrepostos à AP1"
            subtitle="Pilha permanece visível atrás (RN-AP13) · scrim escuro + flat shadow colorida no card"
          >
            <DCArtboard id="resume" label="Modal de Retomada — sessão pendente local" width={390} height={680}>
              <APResumeModal />
            </DCArtboard>
            <DCArtboard id="camera" label="Modal Câmera — captura reconhecida (editável + confirmar)" width={390} height={680}>
              <APCameraModal />
            </DCArtboard>
            <DCArtboard id="camera-fail" label="Modal Câmera — número não reconhecido (tentar/pular)" width={390} height={680}>
              <APCameraModalUnrecognized />
            </DCArtboard>
            <DCArtboard id="paste-single" label="Modal de Colagem — 1 álbum elegível (pré-selecionado)" width={390} height={680}>
              <APPasteModal variant="single" />
            </DCArtboard>
            <DCArtboard id="paste-multi" label="Modal de Colagem — vários álbuns elegíveis (seleção manual)" width={390} height={680}>
              <APPasteModal variant="multi" />
            </DCArtboard>
            <DCArtboard id="exit" label="Alerta de saída — pendentes na pilha" width={390} height={680}>
              <APExitAlert />
            </DCArtboard>
          </DCSection>

          <DCSection
            id="desktop"
            title="AP1 · Versão desktop (≥ 1024px)"
            subtitle="Layout 2 colunas: entrada sticky à esquerda, pilha em grid à direita"
          >
            <DCArtboard id="desktop-active" label="AP1 desktop · pilha em grid 2col" width={1280} height={1020}>
              <AP1Desktop />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
