<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meu Album — Cadastro de Álbum</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" />

  <link rel="stylesheet" href="styles.css" />
  <style>
    html, body { margin: 0; padding: 0; background: #f0eee9; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="cadastro-album.jsx"></script>
  <script type="text/babel">
    function App() {
      return (
        <DesignCanvas>
          <DCSection
            id="ca-mobile"
            title="Cadastro de Álbum · Mobile (390 px)"
            subtitle="Tela CA1 com variante 'Capa dura ouro' selecionada · Diálogo CA2 modal · regras RN-CAxx mapeadas"
          >
            <DCArtboard id="ca1-mobile" label="Mobile · CA1 — Variante selecionada" width={390} height={2160}>
              <CadastroMobile />
            </DCArtboard>
            <DCArtboard id="ca2-mobile" label="Mobile · CA2 — Diálogo pós-criação" width={390} height={1180}>
              <CadastroMobileDialog />
            </DCArtboard>
          </DCSection>

          <DCSection
            id="ca-desktop"
            title="Cadastro de Álbum · Desktop (1280 px)"
            subtitle="Sidebar + duas colunas · formulário à esquerda · preview do álbum à direita · variante 'Capa dura ouro' selecionada"
          >
            <DCArtboard id="ca1-desktop" label="Desktop · CA1 — Variante selecionada" width={1280} height={1160}>
              <CadastroDesktop />
            </DCArtboard>
            <DCArtboard id="ca2-desktop" label="Desktop · CA2 — Diálogo pós-criação" width={1280} height={920}>
              <CadastroDesktopDialog />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
