<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meu Album — Álbuns (Gerenciamento)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" />
  <link rel="stylesheet" href="styles.css" />
  <style>html,body{margin:0;padding:0;background:#f0eee9;}#root{min-height:100vh;}</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="albuns-wf.jsx"></script>
  <script type="text/babel">
    function App() {
      return (
        <DesignCanvas>

          <DCSection
            id="al0-mobile"
            title="AL0 · Lista de Álbuns — Mobile (390 px)"
            subtitle="Álbuns ativos + seção de arquivados (condicional) · RN-AL02, RN-AL09, RN-AL13"
          >
            <DCArtboard id="al0-mob-normal" label="Mobile · Estado normal — ativos + arquivados" width={390} height={1260}>
              <AL0Mobile archived={true} />
            </DCArtboard>
            <DCArtboard id="al0-mob-noarchive" label="Mobile · Sem álbuns arquivados — seção oculta (RN-AL13)" width={390} height={860}>
              <AL0Mobile archived={false} />
            </DCArtboard>
          </DCSection>

          <DCSection
            id="al0-desktop"
            title="AL0 · Lista de Álbuns — Desktop (1280 px)"
            subtitle="Sidebar + grade de 3 colunas · seção de arquivados ao final"
          >
            <DCArtboard id="al0-desk-normal" label="Desktop · Estado normal — ativos + arquivados" width={1280} height={980}>
              <AL0Desktop />
            </DCArtboard>
          </DCSection>

          <DCSection
            id="al1-mobile"
            title="AL1 · Gerenciamento do Álbum — Mobile (390 px)"
            subtitle="Cabeçalho do álbum · barra de ações · lista de seções com expansão · RN-AL04 a RN-AL20"
          >
            <DCArtboard id="al1-mob-normal" label="Mobile · Estado normal — seção Brasil expandida" width={390} height={1480}>
              <AL1Mobile />
            </DCArtboard>
            <DCArtboard id="al1-mob-archiving" label="Mobile · Confirmação de arquivamento (RN-AL09)" width={390} height={1580}>
              <AL1Mobile archiving={true} showAnnotations={false} />
            </DCArtboard>
            <DCArtboard id="al1-mob-pdf" label="Mobile · PDF em geração — spinner bloqueante (RN-AL19)" width={390} height={900}>
              <AL1Mobile pdfSpinner={true} showAnnotations={false} />
            </DCArtboard>
          </DCSection>

          <DCSection
            id="al1-desktop"
            title="AL1 · Gerenciamento do Álbum — Desktop (1280 px)"
            subtitle="Sidebar + layout expandido · barra de ações sticky · seções com figurinhas faltantes em grid"
          >
            <DCArtboard id="al1-desk-normal" label="Desktop · Estado normal — seção Brasil expandida" width={1280} height={1100}>
              <AL1Desktop />
            </DCArtboard>
          </DCSection>

        </DesignCanvas>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
