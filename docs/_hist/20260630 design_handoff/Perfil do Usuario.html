<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meu Album — Perfil do Usuário</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" />
  <link rel="stylesheet" href="styles.css" />
  <style>html,body{margin:0;padding:0;background:#f0eee9;}#root{min-height:100vh;}</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="perfil-wf.jsx"></script>
  <script type="text/babel">
    function App() {
      return (
        <DesignCanvas>

          <DCSection
            id="p1-mobile"
            title="P1 · Perfil / Configurações — Mobile (390 px)"
            subtitle="5 seções empilhadas: Identificador · Nome · Email · Senha · Excluir conta · RN-P01 a RN-P28"
          >
            <DCArtboard id="p1-mob-normal" label="Mobile · Estado normal (status ATIVO)" width={390} height={1680}>
              <P1Mobile />
            </DCArtboard>
            <DCArtboard id="p1-mob-email-pending" label="Mobile · Email_PENDENTE — aviso de alteração aguardando confirmação (RN-P08)" width={390} height={1820}>
              <P1Mobile emailPendente={true} showAnnotations={false} />
            </DCArtboard>
            <DCArtboard id="p1-mob-delete" label="Mobile · Confirmação de exclusão expandida (RN-P24 / RN-P25)" width={390} height={1900}>
              <P1Mobile deleteExpanded={true} showAnnotations={false} />
            </DCArtboard>
          </DCSection>

          <DCSection
            id="p1-desktop"
            title="P1 · Perfil / Configurações — Desktop (1280 px)"
            subtitle="Sidebar + coluna central máx. 680px · Nome e Email em grid 2 colunas · demais seções em coluna"
          >
            <DCArtboard id="p1-desk-normal" label="Desktop · Estado normal" width={1280} height={1060}>
              <P1Desktop />
            </DCArtboard>
            <DCArtboard id="p1-desk-email-pending" label="Desktop · EMAIL_PENDENTE — aviso de confirmação aguardada" width={1280} height={1180}>
              <P1Desktop emailPendente={true} showAnnotations={false} />
            </DCArtboard>
          </DCSection>

          <DCSection
            id="p2"
            title="P2 · Confirmação de Alteração de Email"
            subtitle="Acessada via link no novo endereço · dois estados: sucesso e token inválido/expirado · RN-P11 / RN-P15"
          >
            <DCArtboard id="p2-mob-success" label="Mobile · Sucesso — email atualizado (RN-P15)" width={390} height={680}>
              <P2Mobile />
            </DCArtboard>
            <DCArtboard id="p2-mob-error" label="Mobile · Erro — link inválido ou expirado (RN-P11)" width={390} height={580}>
              <P2MobileError />
            </DCArtboard>
          </DCSection>

        </DesignCanvas>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
